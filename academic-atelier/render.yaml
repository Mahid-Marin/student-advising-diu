services:
  - type: web
    name: academic-atelier-backend
    runtime: java
    buildCommand: cd backend-spring && mvn clean package -DskipTests
    startCommand: cd backend-spring && java -Dserver.port=$PORT -jar target/academic-atelier-backend-1.0.0.jar
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "8080"
      - key: JAVA_OPTS
        value: -Xmx512m

  - type: web
    name: academic-atelier-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://academic-atelier-backend.onrender.com/api
    routes:
      - path: "/"
        handleNotFound: true

  - type: web
    name: academic-atelier-python-api
    runtime: python-3.11
    buildCommand: cd python-api && pip install -r requirements.txt
    startCommand: cd python-api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "8000"
